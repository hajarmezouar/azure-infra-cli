name: Azure Infrastructure CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  validate-and-login:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure CLI
        run: az account show

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          Get-ChildItem powershell -Filter *.ps1 |
          ForEach-Object {
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$null,
              [ref]$null
            ) | Out-Null

            Write-Host "$($_.Name) OK"
          }
